<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Interactive: Build Your Government — Forward!</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-nav="politics" class="hide-breaking">

<div id="header-placeholder"></div>

<header class="topic-header">
  <div class="container">
    <h1 class="topic-title">Government Builder</h1>
    <p class="topic-description">Simulate the balance of power in the Constitutional Assembly. Add new factions, redistribute the seats, and forge your own theoretical majority.</p>
  </div>
</header>

<main class="container">
  
  <div class="topic-layout">
    
    <div class="topic-main">
      <div class="viz-module">
        <svg id="parliament-svg" viewBox="0 0 400 230"></svg>
        
        <div class="status-panel" id="status-panel">
          </div>
      </div>
    </div>

    <div class="topic-sidebar">
      
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <span>Factions & Parties</span>
          <span id="total-seat-counter" style="color:var(--ink);">0 / 624 Seats</span>
        </div>
        <div class="sidebar-header-bottom">
          <span>Total Assembly Capacity</span>
          <input type="text" inputmode="numeric" pattern="[0-9]*" id="input-max-seats" value="624">
        </div>
      </div>
      
      <div class="party-editor-list" id="party-editor-list">
        </div>

      <button class="add-party-btn" id="btn-add-party">+ Add New Party</button>
    </div>
  </div>

  <div class="tags-row">
        <span class="tag">[Tag 1]</span>
        <span class="tag">[Tag 2]</span>
        <span class="tag">[Tag 3]</span>
        <span class="tag">[Tag 4]</span>
  </div>

  <div class="related-section container"></div>

</main>

<div id="footer-placeholder"></div>

    <script src="assets/js/parliament-builder.js"></script>
    <script src="assets/js/aqi-data.js"></script>
    <script src="assets/js/aqi-ticker.js"></script>
    <script src="assets/js/article-data.js"></script>
    <script src="assets/js/relative-time.js"></script>
    <script src="assets/js/components-loader.js"></script>
</body>
</html>
